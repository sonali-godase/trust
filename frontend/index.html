<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <style>
      /* Aggressively hide all Google Translate UI elements */
      .goog-te-banner-frame.skiptranslate, 
      .goog-te-gadget-icon, 
      .goog-te-gadget-simple, 
      .goog-te-gadget, 
      .goog-logo-link, 
      .goog-tooltip,
      .goog-tooltip:hover,
      #google_translate_element,
      #goog-gt-tt {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }
      body {
        top: 0 !important;
      }
      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important; 
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'en,hi,mr,kn', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
